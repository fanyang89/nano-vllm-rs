# https://taskfile.dev

version: "3"

tasks:
  download:
    desc: Download models
    cmds:
      - uvx hf download --local-dir ./models/Qwen3-0.6B Qwen/Qwen3-0.6B
      - uvx hf download --local-dir ./models/Qwen3-Embedding-0.6B Qwen/Qwen3-Embedding-0.6B

  convert:
    desc: Build Qwen3 conversion plan from safetensors
    vars:
      MODEL: ./models/Qwen3-0.6B
      OUT: ./models/Qwen3-0.6B/weights-map.json
    cmds:
      - cargo run --release -- convert-model --model {{.MODEL}} --out {{.OUT}}

  run-cpu:
    desc: Run inference on CPU
    vars:
      PROMPT: "Hello"
      MODEL: ./models/Qwen3-0.6B
    cmds:
      - cargo run --release -- run --model {{.MODEL}} --device cpu --prompt "{{.PROMPT}}" --greedy

  run-rocm:
    desc: Run inference on ROCm with cubecl hipconfig shim
    vars:
      MODEL: ./models/Qwen3-0.6B
      PROMPT: "Hello"
      HIP_PATH: /opt/rocm-7.2.0
      HIPSIM_DIR: /tmp/hipshim
      ROCM_TARGET_DIR: target/rocm
    env:
      HIP_PATH: "{{.HIP_PATH}}"
      CARGO_TARGET_DIR: "{{.ROCM_TARGET_DIR}}"
      PATH: "{{.HIPSIM_DIR}}:{{env \"PATH\"}}"
    cmds:
      - mkdir -p {{.HIPSIM_DIR}}
      - |
        cat > {{.HIPSIM_DIR}}/hipconfig <<'SHIM'
        #!/usr/bin/env bash
        case "$1" in
          --version) echo "7.2.52802-fc0010cf6a" ;;
          -R) echo "{{.HIP_PATH}}" ;;
          -p) echo "{{.HIP_PATH}}" ;;
          *) /usr/bin/hipconfig "$@" ;;
        esac
        SHIM
      - chmod +x {{.HIPSIM_DIR}}/hipconfig
      - cargo run --release --features rocm -- run --model {{.MODEL}} --device rocm --prompt "{{.PROMPT}}" --greedy

  bench-py-rocm-fast:
    desc: Run fast Python-compatible ROCm benchmark
    vars:
      MODEL: ./models/Qwen3-0.6B
      NUM_SEQS: 8
      MAX_INPUT_LEN: 64
      MAX_OUTPUT_LEN: 64
      WARMUP: 0
      ITERS: 1
      SEED: 0
      QUIET_FLAG: --quiet
      HIP_PATH: /opt/rocm-7.2.0
      HIPSIM_DIR: /tmp/hipshim
      ROCM_TARGET_DIR: target/rocm
    env:
      HIP_PATH: "{{.HIP_PATH}}"
      CARGO_TARGET_DIR: "{{.ROCM_TARGET_DIR}}"
      PATH: "{{.HIPSIM_DIR}}:{{env \"PATH\"}}"
    cmds:
      - mkdir -p {{.HIPSIM_DIR}}
      - |
        cat > {{.HIPSIM_DIR}}/hipconfig <<'SHIM'
        #!/usr/bin/env bash
        case "$1" in
          --version) echo "7.2.52802-fc0010cf6a" ;;
          -R) echo "{{.HIP_PATH}}" ;;
          -p) echo "{{.HIP_PATH}}" ;;
          *) /usr/bin/hipconfig "$@" ;;
        esac
        SHIM
      - chmod +x {{.HIPSIM_DIR}}/hipconfig
      - >
        cargo run --release --features rocm --
        bench-py --model {{.MODEL}} --device rocm
        --num-seqs {{.NUM_SEQS}}
        --max-input-len {{.MAX_INPUT_LEN}}
        --max-output-len {{.MAX_OUTPUT_LEN}}
        --warmup {{.WARMUP}} --iters {{.ITERS}} --seed {{.SEED}}
        {{.QUIET_FLAG}}

  bench-py-rocm:
    desc: Run normal Python-compatible ROCm benchmark
    vars:
      MODEL: ./models/Qwen3-0.6B
      NUM_SEQS: 64
      MAX_INPUT_LEN: 256
      MAX_OUTPUT_LEN: 256
      WARMUP: 1
      ITERS: 1
      SEED: 0
      QUIET_FLAG: --quiet
      HIP_PATH: /opt/rocm-7.2.0
      HIPSIM_DIR: /tmp/hipshim
      ROCM_TARGET_DIR: target/rocm
    env:
      HIP_PATH: "{{.HIP_PATH}}"
      CARGO_TARGET_DIR: "{{.ROCM_TARGET_DIR}}"
      PATH: "{{.HIPSIM_DIR}}:{{env \"PATH\"}}"
    cmds:
      - mkdir -p {{.HIPSIM_DIR}}
      - |
        cat > {{.HIPSIM_DIR}}/hipconfig <<'SHIM'
        #!/usr/bin/env bash
        case "$1" in
          --version) echo "7.2.52802-fc0010cf6a" ;;
          -R) echo "{{.HIP_PATH}}" ;;
          -p) echo "{{.HIP_PATH}}" ;;
          *) /usr/bin/hipconfig "$@" ;;
        esac
        SHIM
      - chmod +x {{.HIPSIM_DIR}}/hipconfig
      - >
        cargo run --release --features rocm --
        bench-py --model {{.MODEL}} --device rocm
        --num-seqs {{.NUM_SEQS}}
        --max-input-len {{.MAX_INPUT_LEN}}
        --max-output-len {{.MAX_OUTPUT_LEN}}
        --warmup {{.WARMUP}} --iters {{.ITERS}} --seed {{.SEED}}
        {{.QUIET_FLAG}}

  bench-py-rocm-heavy:
    desc: Run heavy Python-compatible ROCm benchmark
    vars:
      MODEL: ./models/Qwen3-0.6B
      NUM_SEQS: 256
      MAX_INPUT_LEN: 1024
      MAX_OUTPUT_LEN: 1024
      WARMUP: 1
      ITERS: 3
      SEED: 0
      QUIET_FLAG: --quiet
      HIP_PATH: /opt/rocm-7.2.0
      HIPSIM_DIR: /tmp/hipshim
      ROCM_TARGET_DIR: target/rocm
    env:
      HIP_PATH: "{{.HIP_PATH}}"
      CARGO_TARGET_DIR: "{{.ROCM_TARGET_DIR}}"
      PATH: "{{.HIPSIM_DIR}}:{{env \"PATH\"}}"
    cmds:
      - mkdir -p {{.HIPSIM_DIR}}
      - |
        cat > {{.HIPSIM_DIR}}/hipconfig <<'SHIM'
        #!/usr/bin/env bash
        case "$1" in
          --version) echo "7.2.52802-fc0010cf6a" ;;
          -R) echo "{{.HIP_PATH}}" ;;
          -p) echo "{{.HIP_PATH}}" ;;
          *) /usr/bin/hipconfig "$@" ;;
        esac
        SHIM
      - chmod +x {{.HIPSIM_DIR}}/hipconfig
      - >
        cargo run --release --features rocm --
        bench-py --model {{.MODEL}} --device rocm
        --num-seqs {{.NUM_SEQS}}
        --max-input-len {{.MAX_INPUT_LEN}}
        --max-output-len {{.MAX_OUTPUT_LEN}}
        --warmup {{.WARMUP}} --iters {{.ITERS}} --seed {{.SEED}}
        {{.QUIET_FLAG}}
